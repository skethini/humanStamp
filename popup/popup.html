<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HumanStamp</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #222;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }
      p {
        margin: 0 0 14px;
        font-size: 12px;
        color: #666;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
      }
      .saved {
        margin-top: 10px;
        font-size: 12px;
        color: #1a7f37;
        min-height: 16px;
      }
      .preview-label {
        margin-top: 14px;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 500;
        color: #444;
      }
      .preview {
        padding: 10px;
        border-radius: 6px;
        background: #f5f5f5;
        font-size: 13px;
        color: #333;
        line-height: 1.4;
      }
      .preview.preview-empty {
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>HumanStamp</h1>
    <p>Required before you can add a signature.</p>
    <label for="displayName">Your name</label>
    <input id="displayName" type="text" placeholder="e.g. Sumedha" autocomplete="name" required />
    <div class="preview-label">Signature preview</div>
    <div class="preview preview-empty" id="preview">Enter your name above to enable signing.</div>
    <div class="saved" id="status"></div>
    <script src="../dist/popup.js"></script>
  </body>
</html>
