<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to HumanStamp</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #222;
      }
      .card {
        width: 100%;
        max-width: 420px;
        padding: 32px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 24px;
        font-size: 14px;
        color: #666;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
      }
      input:focus {
        outline: none;
        border-color: #1a7f37;
        box-shadow: 0 0 0 3px rgba(26, 127, 55, 0.15);
      }
      .preview-label {
        margin-top: 20px;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 500;
        color: #444;
      }
      .preview {
        padding: 12px 14px;
        border-radius: 8px;
        background: #f5f5f5;
        font-size: 14px;
        color: #333;
        line-height: 1.4;
      }
      .preview.preview-empty {
        color: #888;
        font-style: italic;
      }
      button {
        width: 100%;
        margin-top: 24px;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #1a7f37;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #156b2e;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #888;
        text-align: center;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome to HumanStamp</h1>
      <p>
        HumanStamp lets you sign content you personally typed. What name should
        appear on your signatures?
      </p>
      <form id="form">
        <label for="displayName">Your name</label>
        <input
          id="displayName"
          type="text"
          placeholder="e.g. Sumedha"
          autocomplete="name"
          autofocus
          required
        />
        <div class="preview-label">Signature preview</div>
        <div class="preview preview-empty" id="preview">
          Enter your name to see a preview.
        </div>
        <button type="submit" id="continue" disabled>Continue</button>
      </form>
      <p class="hint">You can change this anytime from the HumanStamp extension icon.</p>
    </div>
    <script src="../dist/welcome.js"></script>
  </body>
</html>
